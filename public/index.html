<html>
    <head>
        <!-- Need to add module for import modules-->

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <button id="HomePageB" class="HeaderB">Home Page</button>
            <button id="GamePageB" class="HeaderB">Game Page</button>

            </div>
        </div>

                    </div>
                    <div id="3PTFieldGoalStat">
                        <h4 id="3PTFieldGoalPercentage">50 FG%</h4>
                        <h4 id="3PTFieldGoals">10/20</h4>
                    </div>
                    <div id="FreeThrowStat">
                        <h4 id="FreeThrowPercentage">50 FG%</h4>
                        <h4 id="FreeThrowGoals">10/20</h4>
                    </div>
                    <h4>50 3FG%</h4>
                    <h4>50 FTS</h4>
                    <h4>50 REB</h4>
                    <h4>50 AST</h4>
                    <h4>50 BLK</h4>

                </div>

                
            </div>
            <!-- Players / Team-->
            <div>

            </div>
            <!-- Players / Team Bench -->
            <div>
            
            </div>
        </div>

        <div id="BoxScorePage" class="Pages hidden">
            <p>Save Page</p>
        </div>

        <div id="HistoryPage" class="Pages hidden">
            <p>History Page</p>

        </div>
